<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FL Real Estate — Práctica de Matemáticas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#f4f6fa;--surface:#fff;--surface-2:#f0f2f8;--surface-3:#e8ebf3;--accent:#4f46e5;--accent-bg:#eef2ff;--green:#059669;--green-bg:#ecfdf5;--gold:#d97706;--gold-bg:#fffbeb;--red:#dc2626;--red-bg:#fef2f2;--text:#1e293b;--text-2:#475569;--text-dim:#94a3b8;--border:#e2e8f0;--radius:16px;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);--mono:'JetBrains Mono',monospace}
        html{scroll-behavior:smooth}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

        .topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.04)}
        .topbar h1{font-size:1.1rem;font-weight:800;color:var(--accent)}
        .topbar .score-pill{font-size:.74rem;font-weight:700;padding:5px 14px;border-radius:999px;background:var(--gold-bg);color:var(--gold);border:1px solid #fde68a}
        .calc-toggle{width:44px;height:44px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);color:var(--accent);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all .2s;margin-left:10px}
        .calc-toggle:hover{background:var(--accent);color:#fff}

        .cat-bar{display:flex;gap:8px;padding:14px 24px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border)}
        .cat-bar::-webkit-scrollbar{display:none}
        .cat-chip{white-space:nowrap;padding:9px 20px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-2);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0}
        .cat-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 12px rgba(79,70,229,.2)}

        .score-strip{display:flex;justify-content:center;gap:20px;padding:10px 24px}
        .ss-item{display:flex;align-items:center;gap:6px;font-size:.75rem;font-weight:600;color:var(--text-2);padding:4px 12px;border-radius:8px}
        .ss-item.g{background:var(--green-bg);color:var(--green)}
        .ss-item.r{background:var(--red-bg);color:var(--red)}
        .ss-item.n{background:var(--surface-2);color:var(--text-dim)}

        .container{max-width:640px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:1}

        .formula-ref{background:var(--gold-bg);border:1.5px solid #fde68a;border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
        .formula-ref h3{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);margin-bottom:10px}
        .formula-ref p{font-family:var(--mono);font-size:.82rem;line-height:1.8;color:var(--text-2)}
        .formula-ref p strong{color:var(--text)}

        .problem-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:28px 24px;margin-bottom:16px;box-shadow:var(--shadow)}
        .prob-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
        .prob-badge{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 12px;border-radius:8px;background:var(--accent-bg);color:var(--accent)}
        .prob-num{font-size:.72rem;font-weight:600;color:var(--text-dim)}
        .prob-statement{font-size:1rem;font-weight:500;line-height:1.7;margin-bottom:24px}
        .prob-statement .highlight{color:var(--accent);font-weight:700}

        .steps{display:flex;flex-direction:column;gap:12px}
        .step{background:var(--surface-2);border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;transition:all .3s;opacity:.45;pointer-events:none}
        .step.active{opacity:1;pointer-events:auto;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.08)}
        .step.done{opacity:1;pointer-events:none;border-color:var(--green);background:var(--green-bg)}
        .step-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:8px}
        .step.done .step-label{color:var(--green)}
        .step-label .check{display:none}.step.done .step-label .check{display:inline}
        .step-instruction{font-size:.88rem;color:var(--text-2);line-height:1.6;margin-bottom:14px}
        .step-instruction code{font-family:var(--mono);font-size:.82rem;background:var(--surface);padding:2px 8px;border-radius:6px;color:var(--accent);border:1px solid var(--border)}
        .step-input-row{display:flex;gap:10px;align-items:center}
        .step-input{flex:1;font-family:var(--mono);font-size:1rem;font-weight:600;padding:12px 16px;border-radius:12px;border:2px solid var(--border);background:var(--surface);color:var(--text);outline:none;transition:border-color .2s}
        .step-input:focus{border-color:var(--accent)}
        .step-input.correct{border-color:var(--green);background:var(--green-bg)}
        .step-input.wrong{border-color:var(--red);background:var(--red-bg)}
        .check-btn{padding:12px 20px;border-radius:12px;border:none;font-weight:700;font-size:.82rem;cursor:pointer;transition:all .2s;background:var(--accent);color:#fff}
        .check-btn:hover{box-shadow:0 4px 16px rgba(79,70,229,.2);transform:translateY(-1px)}
        .step-feedback{margin-top:10px;font-size:.82rem;font-weight:600;display:none}
        .step-feedback.show{display:block}
        .step-feedback.correct{color:var(--green)}
        .step-feedback.wrong{color:var(--red)}

        .result-banner{display:none;background:var(--green-bg);border:1.5px solid #a7f3d0;border-radius:var(--radius);padding:24px;text-align:center;margin-top:16px}
        .result-banner.show{display:block}
        .result-banner h3{font-size:1.1rem;font-weight:800;color:var(--green);margin-bottom:6px}
        .result-banner p{font-size:.88rem;color:#065f46}

        .nav-row{display:flex;gap:12px;justify-content:center;padding:20px 0}
        .nav-btn{padding:12px 28px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-2);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
        .nav-btn:hover{border-color:var(--accent);color:var(--accent)}
        .nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
        .nav-btn.primary:hover{box-shadow:0 4px 16px rgba(79,70,229,.25)}

        /* ─── DRAGGABLE CALCULATOR ─────────────────── */
        .calc-window{display:none;position:fixed;top:120px;right:40px;width:300px;background:var(--surface);border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.15);overflow:hidden;z-index:9999;border:1px solid var(--border);resize:none}
        .calc-window.open{display:block}
        .calc-header{background:var(--accent);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:.82rem;cursor:grab;-webkit-user-select:none;user-select:none}
        .calc-header:active{cursor:grabbing}
        .calc-close{background:none;border:none;color:#fff;font-size:1.1rem;cursor:pointer;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center}
        .calc-close:hover{background:rgba(255,255,255,.2)}
        .calc-display{padding:12px 16px;text-align:right;font-family:var(--mono);font-size:1.6rem;font-weight:700;background:var(--surface-2);border-bottom:1px solid var(--border);min-height:60px;display:flex;flex-direction:column;justify-content:center}
        .calc-display .expr{font-size:.72rem;color:var(--text-dim);margin-bottom:2px;min-height:16px}
        .calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;padding:6px;background:var(--surface-2)}
        .calc-btn{padding:14px 0;border:none;font-family:'Inter';font-size:.95rem;font-weight:600;cursor:pointer;border-radius:10px;transition:all .15s;margin:2px;background:var(--surface);color:var(--text)}
        .calc-btn:hover{background:var(--surface-3)}
        .calc-btn:active{transform:scale(.95)}
        .calc-btn.op{background:var(--accent-bg);color:var(--accent);font-weight:700}
        .calc-btn.op:hover{background:#ddd6fe}
        .calc-btn.eq{background:var(--accent);color:#fff;font-weight:700}
        .calc-btn.eq:hover{background:#4338ca}
        .calc-btn.clear{background:var(--red-bg);color:var(--red)}
        .calc-btn.clear:hover{background:#fecaca}
        .calc-fab{width:52px;height:52px;border-radius:14px;border:1.5px solid var(--border);background:var(--surface);color:var(--accent);font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all .2s}
        .calc-fab:hover{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(79,70,229,.25);transform:translateY(-1px)}
        .user-badge{display:flex;align-items:center;gap:8px}
        .user-badge .avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700}
        .user-badge .uname{font-size:.75rem;font-weight:600;color:var(--text-2)}
        .user-badge .logout-btn{font-size:.65rem;color:var(--text-dim);cursor:pointer;text-decoration:underline}
        .login-overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center}
        .login-box{background:var(--surface);border-radius:20px;padding:40px 36px;box-shadow:0 24px 80px rgba(0,0,0,.15);text-align:center;max-width:380px;width:90%}
        .login-box h2{font-size:1.3rem;font-weight:800;color:var(--accent);margin-bottom:6px}
        .login-box p{font-size:.85rem;color:var(--text-2);margin-bottom:20px}
        .login-box input{width:100%;padding:14px 18px;border:2px solid var(--border);border-radius:12px;font-size:1rem;font-weight:600;outline:none;margin-bottom:14px;font-family:'Inter'}
        .login-box input:focus{border-color:var(--accent)}
        .login-box button{width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:1rem;font-weight:700;cursor:pointer}
        .login-box button:hover{background:#4338ca}

        @media(max-width:480px){.prob-statement{font-size:.92rem}.step-input{font-size:.92rem;padding:10px 14px}.calc-window{width:280px;right:10px}}
    </style>
</head>
<body>

<div class="topbar">
    <h1>📐 FL Real Estate — Matemáticas</h1>
    <div style="display:flex;align-items:center;gap:10px">
        <span class="score-pill" id="globalScore">⭐ 0 / 0</span>
        <div class="user-badge" id="userBadge" style="display:none">
            <div class="avatar" id="userAvatar"></div>
            <div><span class="uname" id="userName"></span><br><span class="logout-btn" onclick="logoutUser()">salir</span></div>
        </div>
    </div>
</div>

<div class="cat-bar" id="catBar"></div>

<div class="score-strip">
    <div class="ss-item g">✅ Correctos: <span id="totalCorrect">0</span></div>
    <div class="ss-item r">❌ Errores: <span id="totalWrong">0</span></div>
    <div class="ss-item n">📊 Precisión: <span id="accuracy">—</span></div>
</div>

<div class="container" id="problemArea"></div>

<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>📐 FL Real Estate</h2>
        <p>Ingresa tu nombre para guardar tu progreso</p>
        <input id="loginInput" placeholder="Tu nombre..." onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="doLogin()">Comenzar →</button>
    </div>
</div>

<!-- DRAGGABLE CALCULATOR -->
<div class="calc-window" id="calcWindow">
    <div class="calc-header" id="calcDragHandle"><span>🧮 Calculadora</span><button class="calc-close" onclick="toggleCalc()">✕</button></div>
    <div class="calc-display"><div class="expr" id="calcExpr"></div><div id="calcResult">0</div></div>
    <div class="calc-grid">
        <button class="calc-btn clear" onclick="calcClear()">C</button>
        <button class="calc-btn clear" onclick="calcBackspace()">⌫</button>
        <button class="calc-btn op" onclick="calcInput('%')">%</button>
        <button class="calc-btn op" onclick="calcInput('/')">÷</button>
        <button class="calc-btn" onclick="calcInput('7')">7</button>
        <button class="calc-btn" onclick="calcInput('8')">8</button>
        <button class="calc-btn" onclick="calcInput('9')">9</button>
        <button class="calc-btn op" onclick="calcInput('*')">×</button>
        <button class="calc-btn" onclick="calcInput('4')">4</button>
        <button class="calc-btn" onclick="calcInput('5')">5</button>
        <button class="calc-btn" onclick="calcInput('6')">6</button>
        <button class="calc-btn op" onclick="calcInput('-')">−</button>
        <button class="calc-btn" onclick="calcInput('1')">1</button>
        <button class="calc-btn" onclick="calcInput('2')">2</button>
        <button class="calc-btn" onclick="calcInput('3')">3</button>
        <button class="calc-btn op" onclick="calcInput('+')">+</button>
        <button class="calc-btn" onclick="calcInput('00')">00</button>
        <button class="calc-btn" onclick="calcInput('0')">0</button>
        <button class="calc-btn" onclick="calcInput('.')">.</button>
        <button class="calc-btn eq" onclick="calcEval()">=</button>
    </div>
</div>

<script>
/* ── DRAGGABLE CALCULATOR ──────────────── */
let calcExpr = '';
function toggleCalc() { document.getElementById('calcWindow').classList.toggle('open'); }

/* DRAG LOGIC */
(function(){
    const win = document.getElementById('calcWindow');
    const handle = document.getElementById('calcDragHandle');
    let isDragging=false, offsetX=0, offsetY=0;
    function startDrag(cx,cy){ isDragging=true; const r=win.getBoundingClientRect(); offsetX=cx-r.left; offsetY=cy-r.top; }
    function doDrag(cx,cy){ if(!isDragging)return; win.style.left=(cx-offsetX)+'px'; win.style.top=(cy-offsetY)+'px'; win.style.right='auto'; }
    function endDrag(){ isDragging=false; }
    handle.addEventListener('mousedown', e=>{ e.preventDefault(); startDrag(e.clientX,e.clientY); });
    document.addEventListener('mousemove', e=>doDrag(e.clientX,e.clientY));
    document.addEventListener('mouseup', endDrag);
    handle.addEventListener('touchstart', e=>{ const t=e.touches[0]; startDrag(t.clientX,t.clientY); }, {passive:true});
    document.addEventListener('touchmove', e=>{ if(!isDragging)return; const t=e.touches[0]; doDrag(t.clientX,t.clientY); }, {passive:true});
    document.addEventListener('touchend', endDrag);
})();
function calcInput(v) { calcExpr += v; document.getElementById('calcExpr').textContent = calcExpr.replace(/\*/g,'×').replace(/\//g,'÷'); }
function calcClear() { calcExpr = ''; document.getElementById('calcExpr').textContent = ''; document.getElementById('calcResult').textContent = '0'; }
function calcBackspace() { calcExpr = calcExpr.slice(0, -1); document.getElementById('calcExpr').textContent = calcExpr.replace(/\*/g,'×').replace(/\//g,'÷'); }
function calcEval() {
    try {
        let expr = calcExpr.replace(/%/g, '/100');
        let result = Function('"use strict";return (' + expr + ')')();
        result = Math.round(result * 1000000) / 1000000;
        document.getElementById('calcResult').textContent = result.toLocaleString('en-US', {maximumFractionDigits:6});
        calcExpr = String(result);
    } catch(e) { document.getElementById('calcResult').textContent = 'Error'; calcExpr = ''; }
}
document.addEventListener('keydown', e => {
    if (!document.getElementById('calcWindow').classList.contains('open')) return;
    if ('0123456789.+-*/%'.includes(e.key)) { e.preventDefault(); calcInput(e.key); }
    else if (e.key === 'Enter') { e.preventDefault(); calcEval(); }
    else if (e.key === 'Backspace') { e.preventDefault(); calcBackspace(); }
    else if (e.key === 'Escape') { e.preventDefault(); toggleCalc(); }
    else if (e.key === 'c' || e.key === 'C') { e.preventDefault(); calcClear(); }
});

/* ── VERIFIED PROBLEMS ─────────────────── */
const PROBLEMS = [
    // DOC STAMPS ON DEED
    { cat:"Doc Stamps", title:"Sellos en Escritura", statement:'Propiedad vendida por <span class="highlight">$385,000</span>. ¿Doc Stamps on Deed?',
      formula:'<strong>Deed:</strong> Precio ÷ 100 → redondear ↑ → × $0.70',
      steps:[
        {label:"Paso 1",instruction:'Divide entre $100:<br><code>$385,000 ÷ 100 = ?</code>',answer:3850,hint:"385000/100=3850"},
        {label:"Paso 2",instruction:'Multiplica por $0.70:<br><code>3,850 × $0.70 = ?</code>',answer:2695,hint:"3850×0.70=2695"}
    ]},
    { cat:"Doc Stamps", title:"Deed (con redondeo)", statement:'Casa vendida por <span class="highlight">$247,350</span>. ¿Doc Stamps on Deed?',
      formula:'<strong>Deed:</strong> Precio ÷ 100 → REDONDEAR ↑ al entero → × $0.70',
      steps:[
        {label:"Paso 1",instruction:'Divide entre $100:<br><code>$247,350 ÷ 100 = ?</code>',answer:2473.5,hint:"247350/100=2473.50"},
        {label:"Paso 2",instruction:'Redondea ↑ al entero:<br><code>2,473.5 → ?</code>',answer:2474,hint:"2473.5→2474"},
        {label:"Paso 3",instruction:'Multiplica por $0.70:<br><code>2,474 × $0.70 = ?</code>',answer:1731.80,tolerance:0.01,hint:"2474×0.70=1731.80"}
    ]},
    { cat:"Doc Stamps", title:"Deed (irregular)", statement:'Venta por <span class="highlight">$512,775</span>. ¿Stamps on deed?',
      formula:'Precio ÷ 100 → Redondear ↑ → × $0.70',
      steps:[
        {label:"Paso 1",instruction:'<code>$512,775 ÷ 100 = ?</code>',answer:5127.75,hint:"512775/100"},
        {label:"Paso 2",instruction:'Redondea ↑: <code>5,127.75 → ?</code>',answer:5128,hint:"→5128"},
        {label:"Paso 3",instruction:'<code>5,128 × $0.70 = ?</code>',answer:3589.60,tolerance:0.01,hint:"5128×0.70=3589.60"}
    ]},
    // DOC STAMPS ON NOTE
    { cat:"Doc Stamps", title:"Sellos en Pagaré", statement:'Préstamo de <span class="highlight">$320,000</span>. ¿Doc Stamps on Note?',
      formula:'<strong>Note:</strong> Préstamo ÷ 100 → redondear ↑ → × $0.35',
      steps:[
        {label:"Paso 1",instruction:'<code>$320,000 ÷ 100 = ?</code>',answer:3200,hint:"320000/100"},
        {label:"Paso 2",instruction:'<code>3,200 × $0.35 = ?</code>',answer:1120,hint:"3200×0.35=1120"}
    ]},
    { cat:"Doc Stamps", title:"Note (redondeo)", statement:'Préstamo de <span class="highlight">$189,450</span>. ¿Stamps on note?',
      formula:'Note: Préstamo ÷ 100 → Redondear ↑ → × $0.35',
      steps:[
        {label:"Paso 1",instruction:'<code>$189,450 ÷ 100 = ?</code>',answer:1894.50,tolerance:0.01,hint:"189450/100"},
        {label:"Paso 2",instruction:'Redondea ↑: <code>1,894.5 → ?</code>',answer:1895,hint:"→1895"},
        {label:"Paso 3",instruction:'<code>1,895 × $0.35 = ?</code>',answer:663.25,tolerance:0.01,hint:"1895×0.35=663.25"}
    ]},
    // INTANGIBLE TAX
    { cat:"Intangible Tax", title:"Impuesto Intangible", statement:'Préstamo NUEVO de <span class="highlight">$275,000</span>. ¿Intangible Tax?',
      formula:'<strong>Intangible</strong> = Préstamo NUEVO × $0.002 (sin redondeo)',
      steps:[{label:"Paso 1",instruction:'<code>$275,000 × 0.002 = ?</code>',answer:550,hint:"275000×0.002=550"}]
    },
    { cat:"Intangible Tax", title:"Intangible (irregular)", statement:'Nuevo préstamo: <span class="highlight">$418,750</span>. ¿Intangible?',
      formula:'Préstamo NUEVO × 0.002. Sin redondeo. No aplica a asumidos.',
      steps:[{label:"Paso 1",instruction:'<code>$418,750 × 0.002 = ?</code>',answer:837.50,tolerance:0.01,hint:"418750×0.002=837.50"}]
    },
    // COMBO
    { cat:"Doc Stamps", title:"Combo: Deed+Note+Intangible", statement:'Venta: <span class="highlight">$350,000</span>. Préstamo NUEVO: <span class="highlight">$280,000</span>. Calcula los 3 impuestos.',
      formula:'Deed: Precio÷100×$0.70 | Note: Préstamo÷100×$0.35 | Intangible: Préstamo×$0.002',
      steps:[
        {label:"Stamps Deed",instruction:'<code>$350,000 ÷ 100 × $0.70 = ?</code>',answer:2450,hint:"3500×0.70"},

    ]},
    // COMISIONES
    { cat:"Comisiones", title:"Comisión de Corredor", statement:'Venta: <span class="highlight">$400,000</span>. Comisión: <span class="highlight">6%</span>, split 50/50. ¿Cuánto cada oficina?',
      formula:'Comisión = Precio × Tasa. Split = Comisión ÷ 2',
      steps:[
        {label:"Paso 1",instruction:'<code>$400,000 × 0.06 = ?</code>',answer:24000,hint:"400000×0.06=24000"},
        {label:"Paso 2",instruction:'<code>$24,000 ÷ 2 = ?</code>',answer:12000,hint:"24000/2=12000"}
    ]},
    { cat:"Comisiones", title:"Comisión al Agente", statement:'Venta: <span class="highlight">$550,000</span>. Comisión: <span class="highlight">5.5%</span>. Split 60/40. Listing agent recibe 70% de su broker. ¿Cuánto gana?',
      formula:'Total → Split broker → Split agente',
      steps:[

/* ─── STATE ───────────────────────────── */
let currentCat="Todos", currentProblems=[...PROBLEMS], probIdx=0, stats={correct:0,wrong:0};
const catEmojis={"Todos":"📋","Doc Stamps":"📄","Intangible Tax":"🏷️","Comisiones":"💰","Impuestos":"🏠","Prorrateos":"📅","Amortización":"🔄","LTV":"📊","Tasación":"📐","Acres":"🌾"};
const cats=["Todos",...new Set(PROBLEMS.map(p=>p.cat))];
const catBar=document.getElementById('catBar');
cats.forEach(c=>{const chip=document.createElement('button');chip.className='cat-chip'+(c==="Todos"?' active':'');chip.innerHTML=`<span>${catEmojis[c]||'📌'}</span> ${c}`;chip.onclick=()=>selectCat(c);catBar.appendChild(chip);});

function selectCat(cat){currentCat=cat;document.querySelectorAll('.cat-chip').forEach(c=>c.classList.toggle('active',c.textContent.includes(cat)));currentProblems=cat==="Todos"?[...PROBLEMS]:PROBLEMS.filter(p=>p.cat===cat);probIdx=0;renderProblem();}

function renderProblem(){
    const area=document.getElementById('problemArea');
    if(!currentProblems.length){area.innerHTML='<div class="problem-card"><p style="text-align:center;color:var(--text-dim)">No hay problemas.</p></div>';return;}
    const prob=currentProblems[probIdx];
    let stepsHTML=prob.steps.map((s,i)=>`
        <div class="step ${i===0?'active':''}" id="step-${i}">
            <div class="step-label"><span class="check">✓</span>${s.label}</div>
            <div class="step-instruction">${s.instruction}</div>
            <div class="step-input-row">
                <input class="step-input" id="input-${i}" type="number" step="any" placeholder="Tu respuesta..." onkeydown="if(event.key==='Enter')checkStep(${i})">
                <button class="check-btn" onclick="checkStep(${i})">Verificar</button>
            </div>
            <div class="step-feedback" id="feedback-${i}"></div>
            ${s.hint?`<div style="margin-top:6px;font-size:.72rem;color:var(--text-dim);cursor:pointer" onclick="this.textContent='💡 '+PROBLEMS.find(p=>p.title==='${prob.title.replace(/'/g,"\\'")}')?.steps[${i}]?.hint">💡 Ver pista</div>`:''}
        </div>`).join('');
    area.innerHTML=`
        <div class="formula-ref"><h3>📖 Fórmula de Referencia</h3><p>${prob.formula.replace(/\n/g,'<br>')}</p></div>
        <div class="problem-card">
            <div class="prob-header"><span class="prob-badge">${prob.cat} — ${prob.title}</span><span class="prob-num">${probIdx+1} / ${currentProblems.length}</span></div>
            <p class="prob-statement">${prob.statement}</p>
            <div class="steps">${stepsHTML}</div>
            <div class="result-banner" id="resultBanner"><h3>🎉 ¡Problema Completado!</h3><p id="resultText">Todos los pasos correctos.</p></div>
        </div>
        <div class="nav-row"><button class="nav-btn" onclick="goPrev()">◀ Anterior</button><button class="calc-fab" onclick="toggleCalc()" title="Abrir Calculadora">🧮</button><button class="nav-btn primary" onclick="goNext()">Siguiente ▶</button></div>`;
    updateGlobalScore();
    setTimeout(()=>{const el=document.getElementById('input-0');if(el)el.focus();},100);
}

function checkStep(i){
    const prob=currentProblems[probIdx],step=prob.steps[i],input=document.getElementById(`input-${i}`),feedback=document.getElementById(`feedback-${i}`),stepEl=document.getElementById(`step-${i}`);
    const val=parseFloat(input.value);if(isNaN(val)){input.classList.add('wrong');return;}
    const tol=step.tolerance||0.01, ok=Math.abs(val-step.answer)<=tol;
    feedback.classList.add('show');
    if(ok){
        input.classList.remove('wrong');input.classList.add('correct');input.disabled=true;
        feedback.className='step-feedback show correct';
        feedback.innerHTML=`✓ ¡Correcto! Respuesta: <strong>${fmtN(step.answer)}</strong>`;
        stepEl.classList.remove('active');stepEl.classList.add('done');stats.correct++;
        const next=document.getElementById(`step-${i+1}`);
        if(next){next.classList.add('active');setTimeout(()=>{document.getElementById(`input-${i+1}`)?.focus();next.scrollIntoView({behavior:'smooth',block:'center'});},300);}
        else{const b=document.getElementById('resultBanner');b.classList.add('show');b.scrollIntoView({behavior:'smooth',block:'center'});}
    } else {
        input.classList.add('wrong');input.classList.remove('correct');
        feedback.className='step-feedback show wrong';
        feedback.innerHTML='✗ Incorrecto. Intenta de nuevo. Usa la calculadora 🧮';stats.wrong++;
    }
    updateGlobalScore();
}

function fmtN(n){return Number.isInteger(n)?n.toLocaleString('en-US'):n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function updateGlobalScore(){
    const t=stats.correct+stats.wrong;
    document.getElementById('globalScore').textContent=`⭐ ${stats.correct} / ${t}`;
    document.getElementById('totalCorrect').textContent=stats.correct;
    document.getElementById('totalWrong').textContent=stats.wrong;
    document.getElementById('accuracy').textContent=t?Math.round(stats.correct/t*100)+'%':'—';
}
function goNext(){if(probIdx<currentProblems.length-1){probIdx++;renderProblem();window.scrollTo({top:0,behavior:'smooth'});}}
function goPrev(){if(probIdx>0){probIdx--;renderProblem();window.scrollTo({top:0,behavior:'smooth'});}}

/* ── LOGIN & PERSISTENCE ─────────────── */
let currentUser = null;
function doLogin(){
    const name = document.getElementById('loginInput').value.trim();
    if(!name) return;
    currentUser = name;
    localStorage.setItem('fl_user', name);
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('userBadge').style.display = 'flex';
    document.getElementById('userAvatar').textContent = name[0].toUpperCase();
    document.getElementById('userName').textContent = name;
    loadProgress();
}
function logoutUser(){
    currentUser = null;
    localStorage.removeItem('fl_user');
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('userBadge').style.display = 'none';
    document.getElementById('loginInput').value = '';
}
function saveMathProgress(){
    if(!currentUser) return;
    const data = { stats, probIdx, cat: currentCat };
    localStorage.setItem('fl_math_'+currentUser, JSON.stringify(data));
}
function loadProgress(){
    if(!currentUser) return;
    const raw = localStorage.getItem('fl_math_'+currentUser);
    if(!raw) return;
    try {
        const data = JSON.parse(raw);
        if(data.cat) selectCat(data.cat);
        stats = data.stats || {correct:0,wrong:0};
        probIdx = data.probIdx || 0;
        renderProblem();
    } catch(e){}
}
// Auto-save after check
const _origCheck = checkStep;
checkStep = function(i){ _origCheck(i); saveMathProgress(); };
window.addEventListener('beforeunload', saveMathProgress);

// Auto-login
(function(){
    const saved = localStorage.getItem('fl_user');
    if(saved){
        document.getElementById('loginInput').value = saved;
        doLogin();
    }
})();

renderProblem();
</script>
